<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-labelledby="title desc">
  <title id="title">Orbit Engineers</title>
  <desc id="desc">Orbit Engineers wordmark with circular emblem</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c6daff" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <g fill="none" fill-rule="evenodd">
    <circle cx="58" cy="60" r="34" stroke="url(#g)" stroke-width="6"/>
    <ellipse cx="58" cy="60" rx="46" ry="18" stroke="#ffffff" stroke-opacity="0.7" stroke-width="3" transform="rotate(-18 58 60)"/>
    <circle cx="58" cy="60" r="8" fill="#ffffff"/>
    <text x="112" y="54" fill="#ffffff" font-size="34" font-family="Poppins, Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="0.8">ORBIT</text>
    <text x="114" y="84" fill="#dbe9ff" font-size="16" font-family="Poppins, Segoe UI, Arial, sans-serif" font-weight="500" letter-spacing="3">ENGINEERS</text>
  </g>
</svg>
