            const maxButtons = 7;
            let startPage = 1;
            let endPage = totalPages;
            if (totalPages > maxButtons) {
                const half = Math.floor(maxButtons / 2);
                startPage = Math.max(1, currentPage - half);
                endPage = Math.min(totalPages, startPage + maxButtons - 1);
                if (endPage - startPage < maxButtons - 1) startPage = Math.max(1, endPage - maxButtons + 1);
            }

            if (startPage > 1) {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1.5 bg-white border border-slate-200 rounded-md text-slate-700 text-xs sm:text-sm';

                btn.onclick = () => goToPage(1);
                pageButtonsDiv.appendChild(btn);
                if (startPage > 2) {
                    const dots = document.createElement('span');
                    dots.className = 'px-2 text-xs text-slate-400';
                    dots.textContent = '...';
                    pageButtonsDiv.appendChild(dots);
                }
            }

            for (let p = startPage; p <= endPage; p++) {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1.5 border border-slate-200 rounded-md text-xs sm:text-sm';

            const data = currentTab === 'stock' ? stockData : (currentTab === 'pattern' ? patternData : poData);
            let filtered = data;

            // Apply search filter
            if (searchQuery) {
                filtered = filtered.filter(item => {
                    const searchLower = searchQuery.toLowerCase();
                    if (currentTab === 'stock') {
                        return (item.type && item.type.toLowerCase().includes(searchLower)) ||
                               (item.itemName && item.itemName.toLowerCase().includes(searchLower)) ||
                               (item.modelNo && item.modelNo.toLowerCase().includes(searchLower)) ||
                               (item.moc && item.moc.toLowerCase().includes(searchLower));
                    } else if (currentTab === 'pattern') {
                        return item.itemName.toLowerCase().includes(searchLower) ||
                               item.serialNo.toLowerCase().includes(searchLower) ||
                               item.buyFrom.toLowerCase().includes(searchLower);
                    } else {
                        return (item.poNo && item.poNo.toLowerCase().includes(searchLower)) ||
                               (item.vendor && item.vendor.toLowerCase().includes(searchLower)) ||
                               (item.items && item.items.toLowerCase().includes(searchLower));
                    }
                });
            }

            return filtered;
        }

                                <span class="text-slate-600">Location:</span>
                                <span class="font-semibold text-slate-900">${item.buyLocation}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-slate-600">Qty:</span>
                                <span class="font-bold text-slate-900">${item.qty}</span>
                            </div>
                            <div class="mt-3 flex justify-end">
                                <button onclick="editAssetItem('${(item.category||'').toLowerCase()}', ${startIdx + idx})" class="px-3 py-1.5 edit-btn-primary rounded-md text-xs font-bold shadow hover:scale-105 transition">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');

                // render pagination controls for pattern
                renderPagination(totalPages, totalItems, showingStart, showingEnd);
            } else if (currentTab === 'po') {
                // PO Table Header - Order + Missing Parts Details
                tableHeader.innerHTML = `
                    <tr>
                        <th class="table-th">PO No</th>
                        <th class="table-th">Order</th>
                        <th class="table-th">Client</th>
                        <th class="table-th">Type</th>
                        <th class="table-th">Missing Parts</th>
                        <th class="table-th">Qty</th>
                        <th class="table-th">Date</th>
                        <th class="table-th">Status</th>
                        <th class="table-th">Action</th>
                    </tr>
                `;

                // PO Table Rows - Show order + parts details
                tableBody.innerHTML = pageData.map((item, idx) => {
                    // Format missing parts list
                    let partsDisplay = '-';
                    if (item.missingParts && item.missingParts.length > 0) {
                        partsDisplay = item.missingParts.map(p => `${p.partName} (${p.shortage})`).join(', ');
                        if (partsDisplay.length > 40) partsDisplay = partsDisplay.substring(0, 40) + '...';
                    } else if (item.items) {
                        partsDisplay = item.items;
                    }
                    
                    const totalQty = item.totalShortage || (item.missingParts ? item.missingParts.reduce((s, p) => s + p.shortage, 0) : '-');
                    
                    // Find the actual index in full poData array
                    const realIndex = poData.findIndex(p => p.uid === item.uid || p.poNo === item.poNo);
                    
                    return `
                    <tr class="table-row border-b border-slate-100 hover:bg-[rgba(2,39,88,0.04)] cursor-pointer" onclick="viewPODetails(${realIndex})" style="cursor: pointer;">
                        <td class="table-td font-semibold text-purple-700 text-xs">${item.poNo || '-'}</td>
                        <td class="table-td font-semibold text-slate-900 text-xs">${item.orderNo || item.vendor || '-'}</td>
                        <td class="table-td text-slate-600 text-xs">${item.client || '-'}</td>
                        <td class="table-td"><span class="px-2 py-0.5 rounded-md text-[10px] font-semibold bg-blue-100 text-blue-700">${item.orderType || 'N/A'}</span></td>
                        <td class="table-td text-slate-600 text-xs" title="${item.missingParts ? item.missingParts.map(p => p.partName + ': ' + p.shortage + ' ' + p.unit).join('\\n') : ''}">${partsDisplay}</td>
                        <td class="table-td font-bold text-red-600 text-xs">${totalQty}</td>
                        <td class="table-td text-slate-600 text-xs">${item.date || '-'}</td>
                        <td class="table-td"><span class="px-2 py-0.5 rounded-md text-[10px] font-semibold ${getPOStatusColor(item.status)}">${item.status || '-'}</span></td>
                        <td class="table-td col-actions">
                            <i class="fas fa-arrow-right text-slate-400"></i>
                        </td>
                    </tr>
                `}).join('');

                // PO Mobile Cards - Show order + parts details
                mobileCards.innerHTML = pageData.map((item, idx) => {
                    let partsList = '';
                    if (item.missingParts && item.missingParts.length > 0) {
                        partsList = item.missingParts.map(p => `
                            <div class="flex justify-between text-xs py-1 border-b border-slate-100">
                                <span class="text-slate-600">${p.partName}</span>
                                <span class="font-bold text-red-600">${p.shortage} ${p.unit}</span>
                            </div>
                        `).join('');
                    }
                    
                    // Find the actual index in full poData array
                    const realIndex = poData.findIndex(p => p.uid === item.uid || p.poNo === item.poNo);
                    
                    return `
                    <div class="bg-gradient-to-br from-white to-slate-50 rounded-lg p-3 sm:p-4 shadow-md border border-slate-200 hover:shadow-lg transition-all mobile-card-primary">
                        <div class="flex items-start justify-between mb-3">
                            <div>
                                <p class="text-xs text-purple-600 font-bold">${item.poNo}</p>
                                <h3 class="text-sm font-bold text-slate-900">Order: ${item.orderNo || '-'}</h3>
                            </div>
                            <span class="px-2 py-0.5 rounded-md text-[10px] font-semibold ${getPOStatusColor(item.status)}">${item.status}</span>
                        </div>
                        <div class="space-y-1.5 text-xs">
                            <div class="flex justify-between">
                                <span class="text-slate-600">Client:</span>
                                <span class="font-semibold text-slate-900">${item.client || '-'}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-slate-600">Type:</span>
                                <span class="px-2 py-0.5 rounded-md text-[10px] font-semibold bg-blue-100 text-blue-700">${item.orderType || 'N/A'}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-slate-600">Date:</span>
                                <span class="font-semibold text-slate-900">${item.date}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-slate-600">Delivery:</span>
                                <span class="font-semibold text-slate-900">${item.deliveryDate || '-'}</span>
                            </div>
                        </div>
                        ${item.missingParts && item.missingParts.length > 0 ? `
                        <div class="mt-3 pt-2 border-t border-slate-200">
                            <p class="text-xs font-bold text-red-600 mb-2">⚠️ Missing Parts (${item.missingParts.length})</p>
                            ${partsList}
                        </div>
                        ` : ''}
                        <div class="mt-3 flex justify-end">
                            <button onclick="event.stopPropagation(); viewPODetails(${realIndex});" class="btn-primary inline-flex items-center justify-center gap-2 px-3 py-1.5 text-white text-xs font-bold rounded-md">
                                <i class="fas fa-eye"></i> View
                            </button>
                        </div>
                    </div>
                `}).join('');

                // render pagination controls for PO
                renderPagination(totalPages, totalItems, showingStart, showingEnd);
            }
        }

        function getCategoryColor(category) {
            const colors = {
                'Valve': 'bg-blue-100 text-blue-700',
                'Pump': 'bg-purple-100 text-purple-700',
                'Parts': 'bg-green-100 text-green-700',
                'Machinery': 'bg-indigo-100 text-indigo-700',
                'Tools': 'bg-cyan-100 text-cyan-700',
                'Others': 'bg-slate-100 text-slate-700'
            };
            return colors[category] || 'bg-slate-100 text-slate-700';
        }

        function getStatusColor(status) {
            return status === 'Operational' 
                ? 'bg-emerald-100 text-emerald-700' 
                : 'bg-orange-100 text-orange-700';
        }

        function getConditionColor(condition) {
            return condition === 'Operational' 
                ? 'bg-emerald-100 text-emerald-700' 
                : 'bg-orange-100 text-orange-700';
        }

        function getPOStatusColor(status) {
            const colors = {
                'Pending': 'bg-orange-100 text-orange-700',
                'Approved': 'bg-blue-100 text-blue-700',
                'Completed': 'bg-emerald-100 text-emerald-700'
            };
            return colors[status] || 'bg-slate-100 text-slate-700';
        }

        window.editPOItem = function(idx) {
            const filtered = getFilteredData();
            const item = filtered[idx];
            if (!item) return;
            localStorage.setItem('editPOItem', JSON.stringify({ item, idx }));
            window.location.href = '03_stock_assets.html';
        };

        // View PO Details - Navigate to new page
        window.viewPODetails = function(idx) {
            try {
                // Get the full poData array
                const fullData = currentTab === 'po' ? poData : [];
                
                if (!fullData || fullData.length === 0) {
                    alert('No PO data available!');
                    return;
                }
                
                // idx here is the actual index in the full array
                const item = fullData[idx];
                
                if (!item) {
                    console.error('PO item not found at index:', idx);
                    console.log('Full PO Data:', fullData);
                    alert('PO data not found! Index: ' + idx);
                    return;
                }
                
                console.log('Opening PO:', item.poNo, 'Index:', idx);
                
                // Save PO data for the new page with the real index in full data
                localStorage.setItem('viewPOItem', JSON.stringify({ item, idx }));
                window.location.href = '07.1_po_receive.html';
            } catch(e) {
                console.error('Error opening PO details:', e);
                alert('Error opening PO details: ' + e.message);
            }
        };
        
        window.closePOModal = function() {
            const modal = document.getElementById('poDetailModal');
            if (modal) modal.remove();
        };
        
        window.updatePOStatus = function(idx) {
            const newStatus = prompt('Enter new status (Pending / Approved / Completed):');
            if (newStatus && ['Pending', 'Approved', 'Completed'].includes(newStatus)) {
                try {
                    const raw = localStorage.getItem('OrbitPO');
                    const arr = raw ? JSON.parse(raw) : [];
                    if (arr[idx]) {
                        arr[idx].status = newStatus;
                        localStorage.setItem('OrbitPO', JSON.stringify(arr));
                        closePOModal();
                        renderContent();
                        renderStatsCards();
                    }
                } catch(e) { console.error('Error updating PO status', e); }
            }
        };

        function filterItems(category) {
            currentFilter = category;
            renderFilterButtons();
            renderContent();
        }

        function searchItems() {
            searchQuery = document.getElementById('searchInput').value;
            renderContent();
        }

        function goToConfiguration() {
            window.location.href = '10_configuration.html';
        }
        
        // Mobile menu toggle with click-outside-to-close
        document.addEventListener('DOMContentLoaded', function() {
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const mobileMenu = document.getElementById('mobileMenu');
            
            if (mobileMenuBtn && mobileMenu) {
                mobileMenuBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    mobileMenu.classList.toggle('hidden');
                });

                // Close menu when clicking outside
                document.addEventListener('click', function(e) {
                    if (!mobileMenu.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
                        mobileMenu.classList.add('hidden');
                    }
                });
            }
        });

        // Download Excel Function
        function downloadExcel() {
            let data = [];
            let sheetName = '';
            const date = new Date().toLocaleDateString('en-IN').replace(/\//g, '-');
            
            if (currentTab === 'stock') {
                sheetName = 'Stock_Report';
                data = stockData.map(item => ({
                    'Item Name': item.name || '',
                    'Type': item.type || '',
                    'Serial No': item.serial || '',
                    'Category': item.category || '',
                    'Quantity': item.quantity || 0,
                    'Unit': item.unit || '',
                    'Min Stock': item.minStock || 0,
                    'Location': item.location || '',
                    'Last Updated': item.lastUpdated || ''
                }));
            } else if (currentTab === 'pattern') {
                sheetName = 'Pattern_Report';
                data = patternData.map(item => ({
                    'Pattern Name': item.name || '',
                    'Type': item.type || '',
                    'Serial No': item.serial || '',
                    'Material': item.material || '',
                    'Size': item.size || '',
                    'Quantity': item.quantity || 0,
                    'Condition': item.condition || '',
                    'Location': item.location || '',
                    'Last Used': item.lastUsed || ''
                }));
            } else if (currentTab === 'po') {
                sheetName = 'PO_Report';
                data = poData.map(item => ({
                    'PO Number': item.poNo || '',
                    'Date': item.date || '',
                    'Supplier': item.supplier || '',
                    'Item': item.item || '',
                    'Quantity': item.qty || 0,
                    'Unit': item.unit || '',
                    'Status': item.status || '',
                    'Expected Delivery': item.expectedDelivery || '',
                    'Remarks': item.remarks || ''
                }));
            }
            
            if (data.length === 0) {
                alert('No data available to export!');
                return;
            }
            
            // Create workbook and worksheet
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(data);
            
            // Set column widths
            const colWidths = Object.keys(data[0]).map(() => ({ wch: 15 }));
            ws['!cols'] = colWidths;
            
            // Add worksheet to workbook
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
            
            // Generate and download file
            XLSX.writeFile(wb, `${sheetName}_${date}.xlsx`);
        }
    </script>
    <script src="assets/lang.js"></script>
</body>
</html>
